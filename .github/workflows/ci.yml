name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Test on the floor (what go.mod declares) and the latest stable
        # so we catch both "accidentally uses a newer Go feature" and
        # "broken by a new Go release" before users do.
        go: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: Build
        run: go build ./...
      # -race needs cgo. Release binaries are still built with
      # CGO_ENABLED=0; this only affects the test run.
      - name: Test
        run: go test ./... -race -count=1 -coverprofile=coverage.out -covermode=atomic
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.26'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m
